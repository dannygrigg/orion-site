# ── ORION MIS — NETLIFY CONFIGURATION ────────────────────────────
# Static site — no build command needed
# All HTML files served directly, _data/ served as JSON

[build]
  publish = "."

# ── IDENTITY & DECAP CMS ─────────────────────────────────────────
# Netlify Identity handles CMS authentication (no GitHub OAuth needed)

# ── HEADERS ──────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"

[[headers]]
  for = "/cms.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── REDIRECTS ────────────────────────────────────────────────────
# Preserve all existing GitHub Pages routes exactly

# Clean URLs — optional, keeps .html working either way
[[redirects]]
  from = "/helix"
  to = "/helix-product.html"
  status = 301

[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 301

[[redirects]]
  from = "/solutions"
  to = "/solutions.html"
  status = 301

[[redirects]]
  from = "/case-studies"
  to = "/case-studies.html"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/hub"
  to = "/hub.html"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/configurator"
  to = "/helix-configurator.html"
  status = 301

# Keep old admin.html working during transition
[[redirects]]
  from = "/admin.html"
  to = "/admin/"
  status = 301

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

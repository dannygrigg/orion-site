backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

site_url: https://uksortation.netlify.app

collections:

  - name: "homepage"
    label: "🏠 Homepage"
    files:
      - name: "homepage"
        label: "Homepage content"
        file: "_data/homepage.json"
        fields:
          - {label: "Hero video URL", name: "hero_video_url", widget: "string", hint: "Paste YouTube watch URL"}
          - {label: "Headline line 1", name: "hero_line1", widget: "string"}
          - {label: "Headline line 2 (italic blue)", name: "hero_line2", widget: "string"}
          - {label: "Body text", name: "hero_body", widget: "text"}
          - {label: "Lease price", name: "hero_lease", widget: "string"}
          - label: "Announcement bar messages"
            name: "announcements"
            widget: "list"
            summary: "{{fields.text}}"
            fields:
              - {label: "Message", name: "text", widget: "string"}
              - {label: "Link URL (optional)", name: "link_url", widget: "string", required: false}
              - {label: "Link label (optional)", name: "link_label", widget: "string", required: false}
          - label: "Stats bar"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Number", name: "number", widget: "string"}
              - {label: "Note", name: "note", widget: "string"}
          - label: "Feature cards"
            name: "features"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
          - {label: "Dark section headline 1", name: "dark_h2_line1", widget: "string"}
          - {label: "Dark section headline 2 (italic blue)", name: "dark_h2_line2", widget: "string"}
          - {label: "Dark section lead text", name: "dark_lead", widget: "text"}
          - {label: "Product visual image", name: "dark_image", widget: "image", required: false}
          - label: "Spec table"
            name: "specs"
            widget: "list"
            fields:
              - {label: "Key", name: "key", widget: "string"}
              - {label: "Value", name: "val", widget: "string"}
          - label: "Proof numbers"
            name: "proof"
            widget: "list"
            fields:
              - {label: "Number", name: "number", widget: "string"}
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
          - {label: "CTA headline", name: "cta_h2", widget: "string"}
          - {label: "CTA body text", name: "cta_lead", widget: "text"}
          - {label: "CTA button text", name: "cta_btn", widget: "string"}

  - name: "helix_product"
    label: "⚡ Helix Product"
    files:
      - name: "helix-product"
        label: "Helix Product page"
        file: "_data/pages/helix-product.json"
        fields:
          - {label: "Hero video URL", name: "hero_video_url", widget: "string", required: false}
          - {label: "Eyebrow", name: "hero_eyebrow", widget: "string"}
          - {label: "Headline (use <em>word</em> for blue italic)", name: "hero_h1", widget: "string"}
          - {label: "Subheadline", name: "hero_sub", widget: "text"}
          - label: "Stats bar"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Number", name: "number", widget: "string"}
              - {label: "Note", name: "note", widget: "string"}
          - {label: "Main product image", name: "main_image", widget: "image", required: false}
          - label: "Gallery images"
            name: "gallery"
            widget: "list"
            max: 4
            fields:
              - {label: "Image", name: "url", widget: "image"}
              - {label: "Alt text", name: "alt", widget: "string", required: false}
          - label: "Spec table"
            name: "specs"
            widget: "list"
            fields:
              - {label: "Key", name: "key", widget: "string"}
              - {label: "Value", name: "val", widget: "string"}
          - {label: "CTA headline", name: "cta_h2", widget: "string", required: false}
          - {label: "CTA body text", name: "cta_lead", widget: "text", required: false}

  - name: "page_content"
    label: "📄 Page Content"
    files:
      - name: "solutions"
        label: "Solutions"
        file: "_data/pages/solutions.json"
        fields:
          - {label: "Hero video URL", name: "hero_video_url", widget: "string", required: false}
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}
          - label: "Solution cards"
            name: "solutions"
            widget: "list"
            fields:
              - {label: "Tag", name: "tag", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Anchor ID", name: "anchor", widget: "string"}
      - name: "about"
        label: "About"
        file: "_data/pages/about.json"
        fields:
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}
          - {label: "Story headline", name: "story_h2", widget: "string", required: false}
          - {label: "Story lead", name: "story_lead", widget: "text", required: false}
          - {label: "Story image", name: "story_image", widget: "image", required: false}
          - label: "Client logos"
            name: "client_logos"
            widget: "list"
            hint: "Upload logos — they appear in the scrolling strip"
            fields:
              - {label: "Logo image", name: "url", widget: "image"}
              - {label: "Company name", name: "alt", widget: "string"}
              - {label: "Website URL", name: "link", widget: "string", required: false}
      - name: "case-studies"
        label: "Case Studies"
        file: "_data/pages/case-studies.json"
        fields:
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}
      - name: "hub"
        label: "Hub"
        file: "_data/pages/hub.json"
        fields:
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}
      - name: "contact"
        label: "Contact"
        file: "_data/pages/contact.json"
        fields:
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}
      - name: "unit-handling"
        label: "Unit Handling"
        file: "_data/pages/unit-handling.json"
        fields:
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}
      - name: "pallet-heavy"
        label: "Pallet & Heavy"
        file: "_data/pages/pallet-heavy.json"
        fields:
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}
      - name: "food-beverage"
        label: "Food & Beverage"
        file: "_data/pages/food-beverage.json"
        fields:
          - {label: "Hero image", name: "hero_image", widget: "image", required: false}
          - {label: "Headline", name: "hero_h1", widget: "string", required: false}
          - {label: "Subheadline", name: "hero_sub", widget: "text", required: false}

  - name: "global"
    label: "⚙️ Global Settings"
    files:
      - name: "global"
        label: "Contact & Global"
        file: "_data/global.json"
        fields:
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Tawk.to chat ID", name: "tawk_id", widget: "string", required: false}

  - name: "news"
    label: "📰 News & Events"
    folder: "_data/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["news", "event", "press", "award"]
        default: "news"
      - {label: "Date", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false}
      - {label: "Summary", name: "summary", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Read more link", name: "link", widget: "string", required: false}
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["published", "draft"]
        default: "published"

  - name: "vault"
    label: "🔒 Vault"
    folder: "_data/vault"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - {label: "Document name", name: "name", widget: "string"}
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["technical", "commercial", "marketing", "compliance", "training"]
      - label: "File type"
        name: "filetype"
        widget: "select"
        options: ["pdf", "doc", "xls", "ppt", "dwg", "zip", "link"]
        default: "pdf"
      - {label: "URL", name: "url", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - label: "Access"
        name: "access"
        widget: "select"
        options: ["public", "partner", "internal"]
        default: "public"
      - {label: "Version", name: "version", widget: "string", required: false}

  - name: "social"
    label: "📱 Social Feed"
    folder: "_data/social"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "caption"
    fields:
      - label: "Platform"
        name: "platform"
        widget: "select"
        options: ["linkedin", "twitter", "instagram", "youtube"]
        default: "linkedin"
      - {label: "Caption", name: "caption", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false}
      - {label: "Post URL", name: "url", widget: "string", required: false}
      - {label: "Image", name: "image", widget: "image", required: false}

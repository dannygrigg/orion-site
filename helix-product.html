.announcement-track{display:flex;align-items:center;height:36px;white-space:nowrap;animation:scrollBanner 35s linear infinite}.announcement-track:hover{animation-play-state:paused}.announcement-item{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:400;color:rgba(255,255,255,.8);padding:0 32px;flex-shrink:0}.announcement-item a{color:#fff;font-weight:500;text-decoration:underline;text-underline-offset:2px}.announcement-sep{color:rgba(255,255,255,.25);font-size:10px;flex-shrink:0}@keyframes scrollBanner{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
nav{position:fixed;top:36px;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.06)}
.nav-logo img{height:36px;display:block}.nav-links{display:flex;gap:24px;list-style:none;align-items:center}.nav-links a{font-size:14px;color:#1d1d1f;text-decoration:none;opacity:.7}.nav-links a:hover{opacity:1}.nav-cta{background:#1d1d1f;color:#fff!important;padding:9px 20px;border-radius:980px;opacity:1!important}

.stats-bar{background:var(--dark)}.stats-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.08);padding:0 48px}.stat-item{background:var(--dark);padding:22px 28px}.stat-label{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}.stat-number{font-family:var(--font-display);font-size:28px;line-height:1;letter-spacing:-.02em;color:var(--white);margin-bottom:4px}.stat-note{font-size:12px;color:rgba(255,255,255,.35);font-weight:300}
.section{padding:72px 48px}.section-inner{max-width:1280px;margin:0 auto}.section-eyebrow{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:14px}.section-eyebrow:before{content:'';width:16px;height:1px;background:var(--blue)}h2{font-family:var(--font-display);font-size:clamp(30px,3.5vw,44px);line-height:1.08;letter-spacing:-.02em;color:var(--dark);margin-bottom:14px}h2 em{font-style:italic;color:var(--blue)}.section-lead{font-size:17px;font-weight:300;line-height:1.65;color:var(--mid);max-width:620px;margin-bottom:40px}
.feature-grid,.renders-grid,.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.feature-card,.render-card,.media-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:var(--shadow)}.feature-title,.render-title,.media-title{font-size:18px;font-weight:500;margin-bottom:8px}.feature-desc,.render-desc,.media-caption{font-size:14px;font-weight:300;line-height:1.7;color:var(--mid)}
.specs-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px}.spec-list{list-style:none;background:var(--white);border:1px solid var(--border);border-radius:20px;padding:12px 24px;box-shadow:var(--shadow)}.spec-list li{display:flex;justify-content:space-between;gap:20px;padding:14px 0;border-bottom:1px solid var(--border)}.spec-list li:last-child{border-bottom:none}.spec-key{color:var(--mid);font-weight:300}.spec-val{font-weight:500;color:var(--dark);text-align:right}

footer{padding:40px 20px 28px!important}
  .footer-inner{grid-template-columns:1fr 1fr!important;gap:28px!important}

  .sidebar{margin-top:0}
  .back-link{margin-bottom:20px}
